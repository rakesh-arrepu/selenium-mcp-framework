# Allure Report Configuration
# This file configures Allure reporting behavior for the Selenium-MCP framework

# Report metadata
allure.results.directory=target/allure-results
allure.link.issue.pattern=https://jira.example.com/browse/{}
allure.link.tms.pattern=https://testmanagement.example.com/testcase/{}

# Enable Cucumber integration
allure.cucumber.integration.enabled=true

# Screenshot settings
allure.screenshot.on.failure=true
allure.screenshot.mode=AUTO

# Environment properties
allure.env.browser=${browser}
allure.env.environment=${test.environment}
allure.env.baseUrl=${base.url}
