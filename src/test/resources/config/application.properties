# ================================================================
# Selenium-MCP Framework Configuration
# ================================================================

# Environment Selection (dev, qa, staging, prod)
environment=dev

# ================================================================
# Application URLs
# ================================================================
base.url.dev=https://dev.example.com
base.url.qa=https://qa.example.com
base.url.staging=https://staging.example.com
base.url.prod=https://example.com

# Default base URL (will be overridden by environment)
base.url=https://example.com

# ================================================================
# Browser Configuration
# ================================================================
# Browser type: chrome, firefox, edge, safari
browser.type=chrome

# Headless mode: true or false
browser.headless=false

# Browser window size
browser.window.width=1920
browser.window.height=1080

# Browser start maximized
browser.maximize=true

# ================================================================
# Timeout Configuration (in milliseconds)
# ================================================================
# Implicit wait timeout
timeout.implicit=10000

# Explicit wait timeout
timeout.explicit=30000

# Page load timeout
timeout.pageload=60000

# Script timeout
timeout.script=30000

# Element find timeout
timeout.element.find=5000

# Element click timeout
timeout.element.click=3000

# ================================================================
# Self-Healing Configuration
# ================================================================
# Maximum retry attempts per locator strategy
healing.max.retry.attempts=3

# Delay between retry attempts (milliseconds)
healing.retry.delay=500

# Enable healing metrics collection
healing.metrics.enabled=true

# Save metrics to file
healing.metrics.save=true

# Metrics output directory
healing.metrics.output.dir=target/healing-metrics

# ================================================================
# Screenshot Configuration
# ================================================================
# Enable screenshots on failure
screenshot.on.failure=true

# Screenshot format: png, jpg
screenshot.format=png

# Screenshot directory
screenshot.dir=screenshots/current

# Baseline screenshots directory
screenshot.baseline.dir=screenshots/baseline

# Capture screenshots for passed tests
screenshot.on.pass=false

# ================================================================
# Reporting Configuration
# ================================================================
# Report output directory
report.output.dir=target/cucumber-reports

# Report title
report.title=Selenium-MCP Test Execution Report

# ================================================================
# Locator Registry Configuration
# ================================================================
# Locator registry file path
locator.registry.path=src/test/resources/locators/locators.json

# Auto-save registry after tests
locator.registry.autosave=true

# Load registry on startup
locator.registry.autoload=true

# ================================================================
# MCP Selenium Configuration
# ================================================================
# MCP server startup timeout (milliseconds)
mcp.server.startup.timeout=5000

# MCP server shutdown timeout (milliseconds)
mcp.server.shutdown.timeout=5000

# MCP request timeout (milliseconds)
mcp.request.timeout=30000

# ================================================================
# Logging Configuration
# ================================================================
# Log level: DEBUG, INFO, WARN, ERROR
log.level=INFO

# Enable console logging
log.console.enabled=true

# Enable file logging
log.file.enabled=true

# Log file path
log.file.path=target/logs/test-execution.log

# ================================================================
# Test Data Configuration
# ================================================================
# Test data directory
testdata.dir=src/test/resources/testdata

# Test data format: csv, json, excel
testdata.format=json

# ================================================================
# Advanced Settings
# ================================================================
# Retry failed tests
test.retry.enabled=false

# Number of retry attempts
test.retry.count=2

# Parallel execution thread count
test.parallel.threads=4

# Take video recording (requires additional setup)
video.recording.enabled=false

# Video output directory
video.output.dir=target/videos

# ================================================================
# Browser Download Configuration
# ================================================================
# Browser download directory for file downloads
browser.download.dir=target/downloads

# Wait for download completion
browser.download.wait.completion=true

# Download timeout (milliseconds)
browser.download.timeout=30000
